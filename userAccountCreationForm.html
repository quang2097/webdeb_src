<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Account Creation</title>

    <link rel="icon" type="image/jpeg" href="../webdeb_public/logo2.jpg">

    <style>
        body {
            background-image: url("../webdeb_public/logo2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center -85px;

            font-family: Arial, sans-serif;

            margin: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;

            background-color: #f2f2f2;
        }

        .signup-container {
            width: 400px;

            background-color: rgba(255, 255, 255, 0.95);

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0 0 15px rgba(0, 0, 0, 0.25);
        }

        .signup-container h1 {
            text-align: center;

            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;

            margin-bottom: 6px;

            font-weight: bold;
        }

        .input-group input {
            width: 100%;

            padding: 10px;

            border: 1px solid #ccc;

            border-radius: 6px;

            box-sizing: border-box;
        }

        .create-button {
            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 6px;

            background-color: #28a745;

            color: white;

            font-size: 16px;

            cursor: pointer;
        }

        .create-button:hover {
            background-color: #1e7e34;
        }

        .extra-links {
            margin-top: 15px;

            text-align: center;

            font-size: 14px;
        }

        .extra-links a {
            text-decoration: none;

            color: #007BFF;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="signup-container">

        <h1>Create Account</h1>

        <form action="#" method="POST">

            <div class="input-group">
                <label for="email">Email</label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="input-group">
                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Choose a username"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a password"
                    required
                >
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>

                <input
                    type="password"
                    id="confirm-password"
                    name="confirm-password"
                    placeholder="Re-enter your password"
                    required
                >
            </div>

            <button type="submit" class="create-button">
                Create Account
            </button>

        </form>

        <div class="extra-links">
            <p>
                Already have an account?
                <a href="userAccountLoginForm.html">
                    Log in
                </a>
            </p>
        </div>

    </div>

</body>
</html>
