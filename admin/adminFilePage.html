<!DOCTYPE html>
<html>
<head>
    <title>Admin File Manager</title>

    <link rel="icon" type="image/jpeg" href="../webdeb_public/admin_icon.jpg">

    <style>
        body {
            background-image: url("../../webdeb_public/admin_icon.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center -200px;

            margin: 0;
            padding: 30px;

            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1200px;

            margin: auto;

            background-color: rgba(255, 255, 255, 0.95);

            padding: 25px;

            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        .file-list {
            display: flex;
            flex-direction: column;

            gap: 15px;
        }

        .file-card {
            background-color: white;

            border: 1px solid #ccc;

            border-radius: 8px;

            padding: 15px;
        }

        .file-card h3 {
            margin-top: 0;
        }

        .file-info {
            margin-bottom: 15px;
        }

        .file-info p {
            margin: 5px 0;
        }

        .action-row {
            display: flex;

            flex-wrap: wrap;

            gap: 10px;
        }

        input,
        select {
            padding: 8px;

            border: 1px solid #ccc;

            border-radius: 5px;
        }

        button {
            border: none;

            border-radius: 5px;

            padding: 10px 15px;

            color: white;

            cursor: pointer;
        }

        .rename-btn {
            background-color: #007BFF;
        }

        .genre-btn {
            background-color: #17a2b8;
        }

        .suspend-btn {
            background-color: #fd7e14;
        }

        .delete-btn {
            background-color: #dc3545;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>File Manager</h1>

        <div id="fileList" class="file-list">

            <!-- Files will be inserted here -->

        </div>

    </div>

    <script>

        function addFile(
            fileId,
            fileName,
            uploader,
            genre,
            status
        ) {

            const fileList =
                document.getElementById("fileList");

            const card =
                document.createElement("div");

            card.className = "file-card";

            card.innerHTML = `
                <h3>${fileName}</h3>

                <div class="file-info">
                    <p><strong>ID:</strong> ${fileId}</p>
                    <p><strong>Uploader:</strong> ${uploader}</p>
                    <p><strong>Genre:</strong> ${genre}</p>
                    <p><strong>Status:</strong> ${status}</p>
                </div>

                <div class="action-row">

                    <input
                        type="text"
                        id="name-${fileId}"
                        placeholder="New file name"
                    >

                    <button
                        class="rename-btn"
                        onclick="renameFile('${fileId}')"
                    >
                        Rename
                    </button>

                </div>

                <br>

                <div class="action-row">

                    <select id="genre-${fileId}">
                        <option value="Fantasy">Fantasy</option>
                        <option value="Science Fiction">
                            Science Fiction
                        </option>
                        <option value="Mystery">Mystery</option>
                        <option value="History">History</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>

                    <button
                        class="genre-btn"
                        onclick="changeGenre('${fileId}')"
                    >
                        Change Genre
                    </button>

                </div>

                <br>

                <div class="action-row">

                    <button
                        class="suspend-btn"
                        onclick="toggleSuspend('${fileId}')"
                    >
                        Suspend / Unsuspend
                    </button>

                    <button
                        class="delete-btn"
                        onclick="deleteFile('${fileId}')"
                    >
                        Delete File
                    </button>

                </div>
            `;

            fileList.appendChild(card);
        }

        function renameFile(fileId) {

            const newName =
                document.getElementById(
                    `name-${fileId}`
                ).value;

            console.log(
                "Rename file:",
                fileId,
                newName
            );
        }

        function changeGenre(fileId) {

            const genre =
                document.getElementById(
                    `genre-${fileId}`
                ).value;

            console.log(
                "Change genre:",
                fileId,
                genre
            );
        }

        function toggleSuspend(fileId) {

            console.log(
                "Suspend/Unsuspend:",
                fileId
            );
        }

        function deleteFile(fileId) {

            if (
                confirm(
                    "Delete this file permanently?"
                )
            ) {
                console.log(
                    "Delete file:",
                    fileId
                );
            }
        }

        /*
        FastAPI can later populate files:

        addFile(
            "123",
            "Dune.pdf",
            "alice",
            "Science Fiction",
            "Active"
        );
        */

    </script>

</body>
</html>
