<!DOCTYPE html>
<html>
<head>
    <title>Admin Manager</title>

    <link rel="icon" type="image/jpeg" href="../../webdeb_public/admin_icon.jpg">

    <style>
        body {
            background-image: url("../webdeb_public/admin_icon.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center -200px;

            font-family: Arial, sans-serif;

            margin: 0;
            padding: 30px;
        }

        .container {
            max-width: 700px;

            margin: auto;

            background-color: rgba(255,255,255,0.95);

            padding: 25px;

            border-radius: 10px;
        }

        h1 {
            text-align: center;
        }

        .section {
            margin-bottom: 30px;

            padding-bottom: 20px;

            border-bottom: 1px solid #ccc;
        }

        label {
            display: block;

            margin-top: 10px;

            margin-bottom: 5px;

            font-weight: bold;
        }

        input,
        select {
            width: 100%;

            padding: 10px;

            box-sizing: border-box;

            border: 1px solid #ccc;

            border-radius: 5px;
        }

        button {
            margin-top: 15px;

            padding: 10px 15px;

            border: none;

            border-radius: 5px;

            cursor: pointer;

            color: white;
        }

        .create-button {
            background-color: #28a745;
        }

        .delete-button {
            background-color: #dc3545;
        }

        .password-button {
            background-color: #007BFF;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Admin Manager</h1>

        <!-- Create Admin -->

        <div class="section">

            <h2>Create Admin</h2>

            <form action="/create-admin" method="POST">

                <label for="newUsername">
                    Username
                </label>

                <input
                    type="text"
                    id="newUsername"
                    name="username"
                    required
                >

                <label for="newPassword">
                    Password
                </label>

                <input
                    type="password"
                    id="newPassword"
                    name="password"
                    required
                >

                <label for="newTier">
                    Admin Tier
                </label>

                <select
                    id="newTier"
                    name="tier"
                >
                    <option value="tier1">
                        Tier 1
                    </option>

                    <option value="tier2">
                        Tier 2
                    </option>
                </select>

                <button
                    type="submit"
                    class="create-button"
                >
                    Create Admin
                </button>

            </form>

        </div>

        <!-- Delete Admin -->

        <div class="section">

            <h2>Delete Admin</h2>

            <form action="/delete-admin" method="POST">

                <label for="deleteUsername">
                    Username
                </label>

                <input
                    type="text"
                    id="deleteUsername"
                    name="username"
                    required
                >

                <button
                    type="submit"
                    class="delete-button"
                >
                    Delete Admin
                </button>

            </form>

        </div>

        <!-- Change Password -->

        <div class="section">

            <h2>Change Admin Password</h2>

            <form action="/change-password" method="POST">

                <label for="changeUsername">
                    Username
                </label>

                <input
                    type="text"
                    id="changeUsername"
                    name="username"
                    required
                >

                <label for="newAdminPassword">
                    New Password
                </label>

                <input
                    type="password"
                    id="newAdminPassword"
                    name="newPassword"
                    required
                >

                <button
                    type="submit"
                    class="password-button"
                >
                    Change Password
                </button>

            </form>

        </div>

    </div>

</body>
</html>
