<!DOCTYPE html>
<html>
<head>
    <title>Admin interface</title>
    <link rel="icon" type="image/jpeg" href="../../webdeb_public/admin_icon.jpg">
    <style>
        .button-column {
            display: flex;
            flex-direction: column;
            align-items: left;
            gap: 0px;
            margin-top: 25px;
        }

        .button-column button {
            width: 150px;
            height: 30px;
            font-size: 15px;
        }
        
        body {
            background-image: url("../webdeb_public/admin_icon.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center -200px;

            margin: 0;
            padding: 30px;

            font-family: Arial, sans-serif;
        }

    </style>
</head>

<body>
    <div class="button-column">
<body>
    <div class="button-column">

        <button
            id="adminManagerButton"
            onclick="window.location.href='adminManagerPage.html'"
            style="display: none;"
        >
            Admin manager
        </button>

        <button onclick="window.location.href='adminFilePage.html'">
            File manager
        </button>

        <button onclick="window.location.href='adminUserPage.html'">
            User manager
        </button>

        <button onclick="window.location.href='reportsPage.html'">
            Reports manager
        </button>

    </div>

    <script>
        /*
            Replace this with data from your login system.

            "tier1" = normal admin
            "tier2" = upper-tier admin
        */

        const adminTier = localStorage.getItem("adminTier");

        if (adminTier === "tier2") {
            document.getElementById(
                "adminManagerButton"
            ).style.display = "block";
        }
    </script>
</body>
</html>
