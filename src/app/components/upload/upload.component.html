<app-header></app-header>
<div class="page-container">
  <div class="upload-card">
    <h2>Upload Novel PDF</h2>
    <p class="subtitle">Select a PDF file to begin processing.</p>

    <div class="file-input-wrapper">
      <input
        type="file"
        id="pdfUpload"
        accept="application/pdf"
        (change)="onFileSelected($event)"
        [disabled]="isUploading"
      >
      <label for="pdfUpload" class="file-label">
        <span *ngIf="!selectedFile">Choose a PDF file...</span>
        <span *ngIf="selectedFile" class="file-name">{{ selectedFile.name }}</span>
      </label>
    </div>

    <button
      class="btn-upload"
      (click)="onUpload()"
      [disabled]="!selectedFile || isUploading">
      {{ isUploading ? 'Uploading...' : 'Start Upload' }}
    </button>

    <div class="progress-container" *ngIf="isUploading">
      <div class="progress-bar" [style.width.%]="uploadProgress"></div>
      <span class="progress-text">{{ uploadProgress }}%</span>
    </div>

    <div class="status success" *ngIf="uploadMessage">{{ uploadMessage }}</div>
    <div class="status error" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>
</div>
