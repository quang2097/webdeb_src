<app-header></app-header>

<div class="page-container">
  <div *ngIf="isLoading" class="status-message">
    <p>Loading profile...</p>
  </div>

  <div *ngIf="errorMessage" class="status-message error">
    <p>{{ errorMessage }}</p>
  </div>

  <div class="profile-card" *ngIf="user && !isLoading">

    <div class="profile-header">
      <div class="avatar-large">{{ user.user_name.charAt(0) | uppercase }}</div>
      <h2>{{ user.user_name }}</h2>

      <span class="role-badge" [ngClass]="user.user_role === 'admin' ? 'admin-badge' : 'user-badge'">
        {{ user.user_role | uppercase }}
      </span>
    </div>

    <hr class="divider">

    <div class="profile-body">
      <div class="info-group">
        <label>Email Address</label>
        <p><strong>{{ user.user_email }}</strong></p>
      </div>

      <div class="info-group">
        <label>Account ID</label>
        <p class="monospace-text">{{ user.user_id }}</p>
      </div>
    </div>

    <div class="profile-footer">
      <a routerLink="/auth/signup/update" class="btn-update">Thay đổi thông tin</a>
    </div>

  </div>
</div>
