<app-header></app-header>

<div class="table-container">
  <h2>System Users</h2>

  <div *ngIf="isLoading" class="loading-message">
    Loading users...
  </div>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <table *ngIf="!isLoading && !errorMessage">
    <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Email</th>
      <th>Role</th>
      <th>Status</th>
      <th>Actions</th> </tr>
    </thead>
    <tbody>
    <tr *ngFor="let user of users">
      <td class="id-column">{{ user.user_id }}</td>
      <td>{{ user.user_name }}</td>
      <td>{{ user.user_email }}</td>
      <td>
          <span class="badge" [ngClass]="user.user_role === 'admin' ? 'admin-badge' : 'user-badge'">
            {{ user.user_role | uppercase }}
          </span>
      </td>
      <td>
          <span [class.text-danger]="user.user_islocked" [class.text-success]="!user.user_islocked">
            {{ user.user_islocked ? 'Locked' : 'Active' }}
          </span>
      </td>
      <td>
        <button
          class="btn-toggle-lock"
          [ngClass]="user.user_islocked ? 'btn-unlock' : 'btn-lock'"
          (click)="toggleLockStatus(user)">
          {{ user.user_islocked ? 'Unlock' : 'Lock' }}
        </button>

        <button class="btn-delete" (click)="deleteUser(user.user_id)">Delete</button>
      </td>
    </tr>
    </tbody>
  </table>

  <div *ngIf="!isLoading && !errorMessage && users.length === 0">
    No users found in the database.
  </div>
</div>
