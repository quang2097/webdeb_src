<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="icon" type="image/jpeg" href="../webdeb_public/logo2.jpg">

    <style>
        body {
            background-image: url("../webdeb_public/logo2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center -85px;

            font-family: Arial, sans-serif;

            margin: 0;
            padding: 20px;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;

            background-color: #f2f2f2;
        }

        .login-container {
            width: 350px;

            background-color: white;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .login-container h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;

            padding: 10px;

            border: 1px solid #ccc;

            border-radius: 6px;

            box-sizing: border-box;
        }

        .login-button {
            width: 100%;

            padding: 12px;

            border: none;

            border-radius: 6px;

            background-color: #007BFF;

            color: white;

            font-size: 16px;

            cursor: pointer;
        }

        .login-button:hover {
            background-color: #0056b3;
        }

        .extra-links {
            margin-top: 15px;

            text-align: center;

            font-size: 14px;
        }

        .extra-links a {
            text-decoration: none;
            color: #007BFF;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <h1>Login</h1>

        <form action="#" method="POST">

            <div class="input-group">
                <label for="email">Email</label>

                <input
                    type="text"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="login-button">
                Log In
            </button>

        </form>

        <div class="extra-links">
            <p>
                Don't have an account?
                <a href="userAccountCreationForm.html">
                    Sign up
                </a>
            </p>
        </div>

    </div>

</body>
</html>
