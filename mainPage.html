<!DOCTYPE html>
<html>
<head>
    <title>Main page</title>

    <link rel="icon" type="image/jpeg" href="../webdeb_public/logo2.jpg">

    <style>

        body {

            background-image: url("../webdeb_public/logo2.jpg");

            /* Only one image */
            background-size: 250px 250px;

            background-repeat: no-repeat;

            /* Position image */
            background-position: top left;

            background-attachment: fixed;

            font-family: Arial, sans-serif;

            margin: 0;
            padding: 20px;
        }

        /* LEFT BUTTONS */

        .button-column {

            display: flex;
            flex-direction: column;

            gap: 10px;

            width: 180px;
        }

        .button-column button {

            width: 170px;
            height: 35px;

            font-size: 15px;

            border-radius: 8px;
            border: none;

            cursor: pointer;
        }

        /* POPUPS */

        .popup {

            display: none;

            position: fixed;

            top: 20px;
            left: 50%;

            transform: translateX(-50%);

            color: white;

            padding: 15px 25px;

            border-radius: 10px;

            font-size: 16px;

            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);

            z-index: 9999;
        }

        #errorPopup {
            background-color: red;
        }

        #successPopup {
            background-color: green;
        }

        /* AI CHAT */

        .ai-container {

            position: fixed;

            top: 20px;
            right: 20px;

            width: 350px;

            background-color: rgba(255,255,255,0.92);

            padding: 15px;

            border-radius: 15px;

            box-shadow: 0px 4px 12px rgba(0,0,0,0.3);

            display: flex;
            flex-direction: column;

            gap: 10px;
        }

        #questionInput {

            width: 100%;
            height: 100px;

            resize: vertical;

            padding: 10px;

            font-size: 15px;

            border-radius: 8px;
            border: 1px solid gray;

            box-sizing: border-box;
        }

        #askButton {

            width: 120px;
            height: 35px;

            border-radius: 8px;
            border: none;

            cursor: pointer;
        }

        /* RESPONSE BOX */

        #answerBox {

            min-height: 40px;

            max-height: 250px;

            overflow-y: auto;

            background-color: rgba(240,240,240,0.95);

            border-radius: 8px;

            padding: 10px;

            white-space: pre-wrap;

            word-wrap: break-word;

            box-sizing: border-box;
        }

        /* LIBRARY */

        /* LIBRARY */

    .library-section {

        /* Push section lower so it clears chatbot */
        margin-top: 150px;

        width: 70%;

        background-color: rgba(255,255,255,0.92);

        padding: 20px;

        border-radius: 15px;

        box-shadow: 0px 4px 12px rgba(0,0,0,0.3);
    }

        #searchBar {

            width: 100%;
            height: 40px;

            padding: 10px;

            font-size: 16px;

            border-radius: 8px;
            border: 1px solid gray;

            box-sizing: border-box;

            margin-bottom: 20px;
        }

        /* BOOK LIST */

        .book-list {

            display: flex;
            flex-direction: column;

            gap: 15px;
        }

        .book-card {

            display: flex;

            gap: 15px;

            background-color: rgba(245,245,245,0.97);

            border-radius: 12px;

            padding: 15px;

            align-items: center;
        }

        .book-card img {

            width: 100px;
            height: 140px;

            object-fit: cover;

            border-radius: 8px;
        }

        .book-info {

            display: flex;
            flex-direction: column;

            gap: 5px;
        }

        .book-title {

            font-size: 22px;
            font-weight: bold;
        }

    </style>

</head>

<body>

    <!-- LOGIN STATUS -->

    <div id="loginStatusBox"
        style="
            position: fixed;
            top: 20px;
            left: 220px;

            background-color: rgba(255,255,255,0.92);

            padding: 10px 15px;

            border-radius: 10px;

            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);

            font-size: 15px;
        ">

        Status:
        <span id="loginStatusText">
            Not logged in
        </span>

    </div>

    <!-- POPUPS -->

    <div id="errorPopup" class="popup"></div>
    <div id="successPopup" class="popup"></div>

    <!-- BUTTONS -->

    <div class="button-column">

    <button onclick="window.location.href='userAccountPage.html'">
        Account
    </button>

    <button onclick="goToProtectedPage('filePage.html')">
        Files
    </button>

    <button onclick="goToProtectedPage('fileUploadForm.html')">
        Upload file
    </button>

</div>

    <!-- AI CHAT -->

    <div class="ai-container">

        <h2>AI Assistant</h2>

        <textarea
            id="questionInput"
            placeholder="Ask something..."
        ></textarea>

        <button id="askButton" onclick="askAI()">
            Ask AI
        </button>

        <div id="answerBox"></div>

    </div>

    <!-- LIBRARY -->

    <div class="library-section">

        <h1>PDF Book Library</h1>

        <!-- SEARCH -->

        <input
            type="text"
            id="searchBar"
            placeholder="Search books by name..."
            onkeyup="searchBooks()"
        >

        <!-- BOOKS -->

        <div class="book-list" id="bookList">

            <!-- Books added dynamically -->

        </div>

    </div>

    <script>

        /* POPUPS */
        function goToProtectedPage(page) {

            if(!loggedIn) {

                const shouldLogin =
                    confirm(
                        "You must be logged in to access this page.\n\nGo to login page?"
                    );

                if(shouldLogin) {

                    window.location.href =
                        "userAccountLoginForm.html";
                }

                return;
            }

            window.location.href = page;
        }

        function showError(message) {

            const popup =
                document.getElementById("errorPopup");

            popup.innerText = message;

            popup.style.display = "block";

            setTimeout(() => {

                popup.style.display = "none";

            }, 3000);
        }

        function showSuccess(message) {

            const popup =
                document.getElementById("successPopup");

            popup.innerText = message;

            popup.style.display = "block";

            setTimeout(() => {

                popup.style.display = "none";

            }, 3000);
        }

        /* AI */

        function askAI() {

            const question =
                document.getElementById("questionInput").value;

            const answerBox =
                document.getElementById("answerBox");

            if(question.trim() === "") {

                showError("Please type a question.");

                return;
            }

            answerBox.innerText =
                "Future AI response goes here.";

            showSuccess("Question submitted.");
        }

        /* SEARCH */

        function searchBooks() {

            const input =
                document.getElementById("searchBar")
                .value
                .toLowerCase();

            const books =
                document.getElementsByClassName("book-card");

            for(let i = 0; i < books.length; i++) {

                const title =
                    books[i]
                    .getElementsByClassName("book-title")[0]
                    .innerText
                    .toLowerCase();

                if(title.includes(input)) {

                    books[i].style.display = "flex";
                }
                else {

                    books[i].style.display = "none";
                }
            }
        }

        /* ADD BOOK FUNCTION */

        function addBook(
            imagePath,
            name,
            id,
            author,
            genre
        ) {

            const bookList =
                document.getElementById("bookList");

            const card =
                document.createElement("div");

            card.className = "book-card";

            card.innerHTML = `
                <img src="${imagePath}">

                <div class="book-info">

                    <div class="book-title">
                        ${name}
                    </div>

                    <div>
                        ID: ${id}
                    </div>

                    <div>
                        Author: ${author}
                    </div>

                    <div>
                        Genre: ${genre}
                    </div>

                </div>
            `;

            bookList.appendChild(card);
        }

    </script>

</body>
</html>
