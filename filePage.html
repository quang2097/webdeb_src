<!DOCTYPE html>
<html>
<head>
    <title>Books</title>

    <link rel="icon" type="image/jpeg" href="../webdeb_public/logo2.jpg">

    <style>
        body {
            background-image: url("../webdeb_public/logo2.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center -85px;

            margin: 0;
            font-family: Arial, sans-serif;
        }

        .file-container {
            width: 80%;
            max-width: 900px;

            margin: 40px auto;

            background-color: rgba(255, 255, 255, 0.9);

            padding: 20px;

            border-radius: 10px;

            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        .file-container h2 {
            margin-top: 0;
        }

        .book-list {
            list-style: none;

            padding: 0;

            margin: 0;
        }

        .book-list li {
            padding: 12px;

            margin-bottom: 10px;

            background-color: white;

            border: 1px solid #ccc;

            border-radius: 5px;
        }

        .book-list a {
            text-decoration: none;

            color: black;

            font-size: 18px;
        }

        .book-list a:hover {
            text-decoration: underline;
        }

        .empty-message {
            color: #666;

            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="file-container">

        <h2>My Books</h2>

        <ul id="bookList" class="book-list">
        </ul>

        <p id="emptyMessage" class="empty-message">
            No books available.
        </p>

    </div>

    <script>
        const bookList = document.getElementById("bookList");
        const emptyMessage = document.getElementById("emptyMessage");

        function addBook(title, link) {
            const item = document.createElement("li");

            item.innerHTML = `
                <a href="${link}">
                    ${title}
                </a>
            `;

            bookList.appendChild(item);

            emptyMessage.style.display = "none";
        }
    </script>

</body>
</html>
